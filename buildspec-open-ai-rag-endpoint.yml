version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    ARTIFACT_BUCKET: mlopswithsagemaker111
    STACK_NAME: open-ai-pinecone-recommendation-systems-endpoint
    PROJECT_NAME: open-ai-pinecone-recommendation-systems
    OPENAI_MODEL: gpt-5.2
    OPENAI_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
    PINECONE_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:awspineconeapikey1-kiudra
    PINECONE_INDEX_NAME: news-demo
    PINECONE_INDEX_HOST: https://news-demo-4fe9eo0.svc.aped-4627-b74a.pinecone.io
    PINECONE_NAMESPACE: news
    PINECONE_DIMENSION: "1024"

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install --upgrade pip
      - mkdir -p package
      - pip install -r rag_endpoint/requirements.txt -t package
  build:
    commands:
      - cp rag_endpoint/app.py package/app.py
      - mkdir -p package/knowledge
      - cp rag_endpoint/knowledge/open_ai_rag_knowledge.txt package/knowledge/open_ai_rag_knowledge.txt
      - cd package
      - zip -r ../open-ai-pinecone-recommendation-systems-endpoint.zip .
      - cd ..
      - aws s3 cp open-ai-pinecone-recommendation-systems-endpoint.zip "s3://${ARTIFACT_BUCKET}/open-ai-pinecone-recommendation-systems/open-ai-pinecone-recommendation-systems-endpoint.zip"
      - |
        aws cloudformation deploy \
          --region "$AWS_REGION" \
          --template-file infrastructure/open-ai-rag-endpoint.yaml \
          --stack-name "$STACK_NAME" \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides \
            ProjectName="$PROJECT_NAME" \
            ArtifactBucketName="$ARTIFACT_BUCKET" \
            LambdaZipKey=open-ai-pinecone-recommendation-systems/open-ai-pinecone-recommendation-systems-endpoint.zip \
            OpenAIApiKeySecretArn="$OPENAI_API_KEY_SECRET_ARN" \
            PineconeApiKeySecretArn="$PINECONE_API_KEY_SECRET_ARN" \
            PineconeIndexName="$PINECONE_INDEX_NAME" \
            PineconeIndexHost="$PINECONE_INDEX_HOST" \
            PineconeNamespace="$PINECONE_NAMESPACE" \
            PineconeDimension="$PINECONE_DIMENSION" \
            OpenAIModel="$OPENAI_MODEL"
      - aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs" --output table
      - ENDPOINT_URL=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='EndpointUrl'].OutputValue | [0]" --output text)
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_recommendations_request.json -o pinecone-recommendations-response.json'
      - python -c "import json; body=json.load(open('pinecone-recommendations-response.json')); assert body.get('retrieval_source') == 'pinecone' and body.get('recommendations'), body; print('Pinecone recommendation systems task passed with 1024-dimensional embeddings')"
      - 'curl -sS -f -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_semantic_search_request.json -o pinecone-semantic-search-response.json'
      - python -c "import json; body=json.load(open('pinecone-semantic-search-response.json')); assert body.get('retrieval_source') == 'pinecone' and body.get('retrieved_context'), body; print('Pinecone semantic search compatibility task passed')"

artifacts:
  files:
    - open-ai-pinecone-recommendation-systems-endpoint.zip
    - pinecone-recommendations-response.json
    - pinecone-semantic-search-response.json

