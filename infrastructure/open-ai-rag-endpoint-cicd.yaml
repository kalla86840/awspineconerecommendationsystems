AWSTemplateFormatVersion: "2010-09-09"
Description: CodePipeline for packaging and deploying the OpenAI and Pinecone recommendation systems real-time endpoint.

Parameters:
  ProjectName:
    Type: String
    Default: open-ai-agentic-rag
  ArtifactBucketName:
    Type: String
    Default: mlopswithsagemaker111
  CodeStarConnectionArn:
    Type: String
    Default: arn:aws:codeconnections:us-west-1:659613508664:connection/4ea8863c-728d-450a-8752-251946939b36
  RepositoryId:
    Type: String
    Default: kalla86840/awspineconerecommendationsystems
  BranchName:
    Type: String
    Default: main
  OpenAIApiKeySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
  PineconeApiKeySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-west-1:659613508664:secret:awspineconeapikey1-kiudra
  PineconeIndexName:
    Type: String
    Default: news-demo
  PineconeIndexHost:
    Type: String
    Default: https://news-demo-4fe9eo0.svc.aped-4627-b74a.pinecone.io
  PineconeNamespace:
    Type: String
    Default: news
  PineconeDimension:
    Type: String
    Default: "1024"

Resources:
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-endpoint-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-endpoint-codebuild-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - cloudformation:*
                  - lambda:*
                  - iam:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref OpenAIApiKeySecretArn
                  - !Ref PineconeApiKeySecretArn

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-endpoint-codepipeline-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-endpoint-codepipeline-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: !Ref CodeStarConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: "*"

  DeployEndpointProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-deploy-rag-endpoint
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucketName
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: OPENAI_API_KEY_SECRET_ARN
            Value: !Ref OpenAIApiKeySecretArn
          - Name: PINECONE_API_KEY_SECRET_ARN
            Value: !Ref PineconeApiKeySecretArn
          - Name: PINECONE_INDEX_NAME
            Value: !Ref PineconeIndexName
          - Name: PINECONE_INDEX_HOST
            Value: !Ref PineconeIndexHost
          - Name: PINECONE_NAMESPACE
            Value: !Ref PineconeNamespace
          - Name: PINECONE_DIMENSION
            Value: !Ref PineconeDimension
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-open-ai-rag-endpoint.yml
      TimeoutInMinutes: 30

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-endpoint-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucketName
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref CodeStarConnectionArn
                FullRepositoryId: !Ref RepositoryId
                BranchName: !Ref BranchName
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: DeployRealtimeRagEndpoint
          Actions:
            - Name: PackageAndDeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref DeployEndpointProject
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

Outputs:
  PipelineName:
    Value: !Ref Pipeline


